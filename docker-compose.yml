# Docker Compose for running the Triton custom backends by mounting the
# pre-built shared libraries and the model repository into the Triton runtime
# container.
#
# Prerequisites:
#   Build the backend shared libraries first:
#        docker run --rm --gpus all -v "$(pwd)":/workspace \
#          nvcr.io/nvidia/tritonserver:25.01-py3 bash /workspace/build.sh
#
# Start the server:
#        docker compose up
#
# The backend shared libraries are mounted into the Triton backend directory:
#   /opt/tritonserver/backends/preprocess/libtriton_preprocess.so
#   /opt/tritonserver/backends/yolo11_postprocess/libtriton_yolo11_postprocess.so
#   /opt/tritonserver/backends/yolov5_postprocess/libtriton_yolov5_postprocess.so

services:
  triton:
    image: nvcr.io/nvidia/tritonserver:25.01-py3
    container_name: triton-backends
    ipc: host
    ports:
      - "48000:8000"   # HTTP
      - "48001:8001"   # gRPC
      - "48002:8002"   # Metrics
    volumes:
      # Model repository (config.pbtxt)
      - ./workspace/models:/models:ro
    command:
      - tritonserver
      - --model-repository=/models
      - --log-verbose=1
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
