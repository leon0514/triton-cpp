# Docker Compose for running the Triton custom backends by mounting the
# pre-built shared libraries and the model repository into the Triton runtime
# container.
#
# Prerequisites:
#   Build the backend shared libraries first:
#        docker run --rm --gpus all -v "$(pwd)":/workspace \
#          nvcr.io/nvidia/tritonserver:25.01-py3 bash /workspace/build.sh
#
#   Convert the yolo11_pose ONNX model to TensorRT plan:
#        bash workspace/models/yolo11_pose/convert_yolo11_pose.sh
#
# Start the server:
#        docker compose up
#
# The backend shared libraries are embedded in the model repository:
#   /models/preprocess/1/libtriton_preprocess.so
#   /models/preprocess_rfdetr/1/libtriton_preprocess.so
#   /models/yolo11_postprocess/1/libtriton_yolo11_postprocess.so
#   /models/yolo11_pose_postprocess/1/libtriton_yolo11_pose_postprocess.so
#   /models/yolo11_obb_postprocess/1/libtriton_yolo11_obb_postprocess.so
#   /models/yolo11_seg_postprocess/1/libtriton_yolo11_seg_postprocess.so
#   /models/yolov5_postprocess/1/libtriton_yolov5_postprocess.so
#   /models/yolo26_postprocess/1/libtriton_yolo26_postprocess.so
#   /models/rfdetr_postprocess/1/libtriton_rfdetr_postprocess.so
#   /models/rfdetr_seg_postprocess/1/libtriton_rfdetr_seg_postprocess.so

services:
  triton:
    image: nvcr.io/nvidia/tritonserver:25.01-py3
    container_name: triton-backends
    ipc: host
    ports:
      - "48000:8000"   # HTTP
      - "48001:8001"   # gRPC
      - "48002:8002"   # Metrics
    env_file:
      - .env
    volumes:
      # Model repository (config.pbtxt + backend .so + model plan)
      - ./workspace/models:/models:ro
      # On-demand loading entrypoint script
      - ./workspace/triton_entrypoint.sh:/triton_entrypoint.sh:ro
      # On-demand loading model list (one model per line)
      - ./workspace/models_to_load.txt:/models_to_load.txt:ro
    command:
      - /bin/bash
      - /triton_entrypoint.sh
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
